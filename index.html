<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library App</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Liverary App</h1>
        </div>

        <div class="main-section">
            <!-- Add books here -->
            <div class="form-section">
                <h2>Add a New Book</h2>
                <form id="bookForm">
                    <div class="form-group">
                        <input 
                            type="text" 
                            id="bookTitle" 
                            placeholder="Title" 
                            required
                        >
                    </div>
                    <div class="form-group">
                        <input 
                            type="text" 
                            id="bookAuthor" 
                            placeholder="Author" 
                            required
                        >
                    </div>
                    <div class="form-group">
                        <input 
                            type="number" 
                            id="bookPages" 
                            placeholder="Page Count" 
                            min="1"
                            required
                        >
                    </div>
                    <div class="checkbox-group">
                        <label>
                            <input type="checkbox" id="bookRead">
                            Did you read this book?
                        </label>
                    </div>
                    <button type="submit" class="btn btn-add">Add</button>
                </form>
            </div>

            <!-- Book List -->
            <div class="books-section">
                <h2>My Books</h2>
                <div id="bookList" class="book-list">
                    <p class="empty-message">You haven't added any books yet.</p>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>&copy; SelimYuksel</p>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Edit Book</h2>
            <form id="editForm">
                <div class="form-group">
                    <input 
                        type="text" 
                        id="editTitle" 
                        placeholder="Title" 
                        required
                    >
                </div>
                <div class="form-group">
                    <input 
                        type="text" 
                        id="editAuthor" 
                        placeholder="Author" 
                        required
                    >
                </div>
                <div class="form-group">
                    <input 
                        type="number" 
                        id="editPages" 
                        placeholder="Page Count" 
                        min="1"
                        required
                    >
                </div>
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" id="editRead">
                        Did you read this book?
                    </label>
                </div>
                <button type="submit" class="btn btn-update">Update</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
